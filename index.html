<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>Social Panel</title>
<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0f172a;
  color:white;
}
header{
  background:#1e293b;
  padding:15px;
  text-align:center;
  font-size:20px;
}
.container{
  display:flex;
}
.sidebar{
  width:200px;
  background:#111827;
  height:100vh;
  padding:10px;
}
.sidebar button{
  width:100%;
  padding:10px;
  margin:5px 0;
  background:#1f2937;
  color:white;
  border:none;
  cursor:pointer;
}
.main{
  flex:1;
  padding:20px;
}
.card{
  background:#1e293b;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}
.hidden{display:none;}
</style>
</head>
<body>

<header>📊 Social Media Service Panel</header>

<div class="container">

  <div class="sidebar">
    <button onclick="show('dashboard')">داشبورد</button>
    <button onclick="show('services')">سرویس‌ها</button>
    <button onclick="show('stats')">آمار</button>
  </div>

  <div class="main">

    <!-- DASHBOARD -->
    <div id="dashboard">
      <div class="card">👋 خوش آمدی به پنل مدیریت</div>
      <div class="card">⚡ وضعیت سیستم: فعال</div>
    </div>

    <!-- SERVICES -->
    <div id="services" class="hidden">
      <div class="card">📌 مدیریت اینستاگرام</div>
      <div class="card">📌 مدیریت تلگرام</div>
      <div class="card">📌 طراحی محتوا</div>
      <div class="card">📌 تبلیغات دیجیتال</div>
    </div>

    <!-- STATS -->
    <div id="stats" class="hidden">
      <div class="card">📈 فالوور: 12,450</div>
      <div class="card">👁 بازدید: 88,210</div>
      <div class="card">💬 تعامل: 4,320</div>
    </div>

  </div>

</div>

<script>
function show(id){
  document.querySelectorAll('.main > div').forEach(d=>d.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}
</script>

</body>
</html>
