<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zeromarket Dashboard</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;700&display=swap');

body{
  margin:0;
  font-family:'Vazirmatn', sans-serif;
  background: linear-gradient(135deg,#0f172a,#020617);
  color:white;
}

/* layout */
.container{
  display:flex;
  min-height:100vh;
}

/* sidebar */
.sidebar{
  width:240px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  padding:20px;
  border-right:1px solid rgba(255,255,255,0.1);
}

.sidebar h2{
  font-size:18px;
  margin-bottom:20px;
  color:#38bdf8;
}

.sidebar button{
  width:100%;
  margin:8px 0;
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background: rgba(255,255,255,0.08);
  color:white;
  transition:0.3s;
}

.sidebar button:hover{
  background:#38bdf8;
  color:#001018;
}

/* main */
.main{
  flex:1;
  padding:25px;
}

/* cards */
.card{
  background: rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  padding:20px;
  margin:12px 0;
  border-radius:16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  transition:0.3s;
}

.card:hover{
  transform: translateY(-4px);
  border-color:#38bdf8;
}

/* header */
.header{
  font-size:22px;
  margin-bottom:20px;
  color:#38bdf8;
}

/* hidden */
.hidden{display:none;}

/* mobile */
@media(max-width:768px){
  .container{flex-direction:column;}
  .sidebar{width:100%;}
}
</style>

</head>
<body>

<div class="container">

  <div class="sidebar">
    <h2>⚡ Zeromarket</h2>
    <button onclick="show('dashboard')">📊 داشبورد</button>
    <button onclick="show('services')">🧾 سرویس‌ها</button>
    <button onclick="show('stats')">📈 آمار</button>
  </div>

  <div class="main">

    <div class="header">پنل مدیریت خدمات</div>

    <!-- DASHBOARD -->
    <div id="dashboard">
      <div class="card">👋 خوش آمدید به Zeromarket</div>
      <div class="card">⚡ وضعیت سیستم: آنلاین</div>
      <div class="card">🚀 نسخه: Pro UI v1</div>
    </div>

    <!-- SERVICES -->
    <div id="services" class="hidden">
      <div class="card">📌 مدیریت اینستاگرام</div>
      <div class="card">📌 مدیریت تلگرام</div>
      <div class="card">📌 طراحی محتوا</div>
      <div class="card">📌 تبلیغات دیجیتال</div>
    </div>

    <!-- STATS -->
    <div id="stats" class="hidden">
      <div class="card">📈 فالوور: 12,450</div>
      <div class="card">👁 بازدید: 88,210</div>
      <div class="card">💬 تعامل: 4,320</div>
    </div>

  </div>

</div>

<script>
function show(id){
  document.querySelectorAll('.main > div').forEach(d=>{
    if(!d.classList.contains('header')){
      d.classList.add('hidden');
    }
  });
  document.getElementById(id).classList.remove('hidden');
}
</script>

</body>
</html>
