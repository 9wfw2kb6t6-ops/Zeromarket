<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zeromarket SaaS Panel</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;700&display=swap');

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:'Vazirmatn', sans-serif;
  background: radial-gradient(circle at top,#1e293b,#020617);
  color:white;
}

/* layout */
.container{
  display:flex;
  min-height:100vh;
}

/* sidebar */
.sidebar{
  width:260px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border-right:1px solid rgba(255,255,255,0.08);
  padding:20px;
}

.logo{
  font-size:20px;
  font-weight:bold;
  color:#38bdf8;
  margin-bottom:25px;
}

.nav button{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:12px;
  cursor:pointer;
  background:rgba(255,255,255,0.06);
  color:white;
  transition:0.3s;
  text-align:right;
}

.nav button:hover{
  background:#38bdf8;
  color:#001018;
  transform:translateX(-3px);
}

/* main */
.main{
  flex:1;
  padding:30px;
}

/* header */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.title{
  font-size:24px;
  font-weight:bold;
}

.badge{
  padding:6px 12px;
  background:rgba(34,197,94,0.2);
  border:1px solid #22c55e;
  border-radius:999px;
  font-size:12px;
}

/* grid */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
}

/* cards */
.card{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  padding:20px;
  border-radius:18px;
  backdrop-filter: blur(10px);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
  border-color:#38bdf8;
}

/* form */
input,select,button{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  border:none;
}

button{
  cursor:pointer;
}

/* orders */
.order{
  margin-top:10px;
  padding:10px;
  border-radius:12px;
  background:rgba(255,255,255,0.04);
}

/* hidden */
.hidden{display:none;}

/* mobile */
@media(max-width:900px){
  .container{flex-direction:column;}
  .grid{grid-template-columns:1fr;}
  .sidebar{width:100%;}
}
</style>
</head>
<body>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo">⚡ Zeromarket</div>
    <div class="nav">
      <button onclick="show('dashboard')">📊 داشبورد</button>
      <button onclick="show('orders')">📦 سفارش‌ها</button>
      <button onclick="show('create')">➕ ثبت سفارش</button>
      <button onclick="logout()">🚪 خروج</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="header">
      <div class="title">SaaS Dashboard</div>
      <div class="badge">Online</div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard">

      <div class="grid">
        <div class="card">📈 درآمد: 12,450$</div>
        <div class="card">👥 کاربران: 1,240</div>
        <div class="card">📦 سفارش‌ها: 320</div>
      </div>

    </div>

    <!-- CREATE -->
    <div id="create" class="hidden">
      <div class="card">
        <h3>➕ ثبت سفارش</h3>
        <input id="name" placeholder="نام مشتری">
        <select id="service">
          <option>Instagram</option>
          <option>Telegram</option>
          <option>Design</option>
        </select>
        <button onclick="addOrder()">ثبت</button>
      </div>
    </div>

    <!-- ORDERS -->
    <div id="orders" class="hidden"></div>

  </div>

</div>

<script>
// 🔥 Firebase Config (جایگزین کن)
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// NAV
function show(id){
  document.querySelectorAll('.main > div').forEach(d=>{
    if(d.id !== undefined) d.classList.add('hidden');
  });
  document.getElementById(id).classList.remove('hidden');
}

// ADD ORDER
function addOrder(){
  db.collection("orders").add({
    name:name.value,
    service:service.value,
    date:new Date().toISOString()
  });
  name.value="";
}

// LOAD ORDERS
db.collection("orders").orderBy("date","desc")
.onSnapshot(snap=>{
  orders.innerHTML="";
  snap.forEach(doc=>{
    let d=doc.data();
    orders.innerHTML += `
      <div class="card order">
        👤 ${d.name} <br>
        📌 ${d.service}
      </div>
    `;
  });
});

// LOGOUT
function logout(){
  auth.signOut().then(()=>location.reload());
}
</script>

</body>
</html>
